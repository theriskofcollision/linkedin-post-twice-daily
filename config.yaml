# LinkedIn Growth Workflow Configuration
# Edit this file to customize the workflow behavior

# AI Model Configuration
model:
  name: "llama-3.3-70b-versatile"
  max_retries: 3
  base_delay_seconds: 5

# Content Topics (randomly selected if no topic provided)
# 20+ topics for maximum variety and "topic DNA" breadth
topics:
  # Core expertise: Agentic AI
  - "Multi-Agent Systems and how they actually work"
  - "Building AI agents that collaborate autonomously"
  - "Why single chatbots are becoming obsolete"
  - "Flow Engineering replacing Prompt Engineering"
  - "LLMs as operating systems for AI agents"
  - "The rise of autonomous AI workflows"
  
  # Practical & hands-on
  - "Tools I use to build AI agents"
  - "Real-world AI automation that saves hours"
  - "Debugging AI agents and what I learned"
  - "Open source AI tools worth trying today"
  - "My daily workflow with AI assistants"
  
  # Industry trends
  - "How AI is changing software engineering"
  - "The future of coding in an AI-first world"
  - "AI startups disrupting traditional software"
  - "Enterprise AI adoption mistakes to avoid"
  - "Small businesses using AI to compete with giants"
  
  # Career & personal growth
  - "Skills that matter in the age of AI"
  - "How to stay relevant when AI writes code"
  - "Career paths in AI and machine learning"
  - "Learning AI development from scratch"
  
  # Big picture / thought leadership
  - "AI ethics and what developers should care about"
  - "The gap between AI hype and AI reality"
  - "What AI still cannot do well"
  - "Predictions for AI in the next 5 years"

# Data Source Limits
sources:
  hackernews:
    scan_limit: 15  # Number of top stories to scan (reduced from 50)
    ai_results: 5   # Max AI-related stories to return
  newsapi:
    limit: 5
  arxiv:
    limit: 3
  tavily:
    max_results: 3

# Memory Settings
memory:
  file_path: "memory.json"
  archive_days: 90  # Archive posts older than this
  archive_file: "memory_archive.json"

# Image Generation
image:
  width: 1200
  height: 628
  max_retries: 3
  timeout_seconds: 60

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL

# Variety & Entropy Settings
variety:
  entropy_level: "high"  # low, medium, high
  enabled_personas: "all"  # "all" or list of specific vibes
  image_mode_preference: "hybrid"  # always_ai, always_real, hybrid
  organic_vibe_threshold: 0.5  # Probability of picking organic image if vibe allows

# Feature Flags
features:
  enable_healer: false  # Disabled for personal profiles (no stats API access)
  enable_networker: true
  enable_image_generation: true
  enable_organic_visuals: true

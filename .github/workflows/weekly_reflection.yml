name: Weekly Reflection

on:
  schedule:
    # Sunday 05:00 UTC = 08:00 Istanbul = 12:00 WIB (Pekanbaru)
    - cron: '0 5 * * 0'
  workflow_dispatch:

jobs:
  reflect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly reflection
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python learning.py

      - name: Publish brief to job summary
        run: cat WEEKLY_BRIEF.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit brief and distilled rules
        run: |
          git config --global user.name 'LinkedIn Bot'
          git config --global user.email 'bot@noreply.github.com'
          git add WEEKLY_BRIEF.md memory.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "📋 Weekly reflection [skip ci]"
            git push
          fi
